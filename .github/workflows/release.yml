name: release

# 打 tag（v* 例如 v0.1.0）时，在干净的 Windows runner 上构建 NSIS 安装包，
# 并发布为一个「草稿 Release」（你确认后手动点 Publish）。
# 也支持手动触发（workflow_dispatch）：只构建并上传产物，不发布 Release。
#
# 注意：在云端干净磁盘上构建，天然规避了本机 E:/C: 跨盘 rename(os error 17) 的打包失败。

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write # 允许创建 Release / 上传产物
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 与 rust-toolchain.toml 保持一致（MSVC 1.88）。rust-toolchain.toml 会在
      # 项目目录内为 cargo 强制使用该版本，这里显式安装确保 runner 上已就绪。
      - name: Install Rust toolchain (1.88 MSVC)
        run: |
          rustup toolchain install 1.88-x86_64-pc-windows-msvc --profile minimal
          rustup default 1.88-x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend deps
        run: npm ci

      # tauri-action 会执行 beforeBuildCommand(npm run build) 并 `tauri build`，
      # 产出 NSIS 安装包；提供 tagName 时同时创建/更新对应的草稿 Release 并上传。
      - name: Build app + installer (and draft release on tag)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          # 仅在 tag 触发时创建 Release；手动触发时为空 → 只构建不发布。
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: "Claude 额度监控 ${{ github.ref_name }}"
          releaseBody: |
            ## 下载
            - **安装版**：`*-setup.exe`（NSIS，含开始菜单快捷方式与卸载程序）

            运行要求：Windows 10/11，已安装 Microsoft Edge WebView2 运行时（Win11 自带）。

            > 额度数字为本地估算（订阅版无官方剩余额度接口）。OAuth token 仅在本机内存使用，绝不上传。
          releaseDraft: true
          prerelease: false

      # 无论是否打 tag，都把安装包作为 workflow 产物上传，方便随时下载/自测。
      - name: Upload installer as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-limit-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
